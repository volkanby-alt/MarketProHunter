name: Windows Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore MarketProHunter.sln

      - name: Build
        run: dotnet build MarketProHunter.sln --configuration Release --no-restore

      - name: Publish single-folder Windows app
        run: dotnet publish src/MarketProHunter/MarketProHunter.csproj --configuration Release --runtime win-x64 --self-contained true -p:PublishSingleFile=false -p:PublishReadyToRun=false --output publish/MarketProHunter

      - name: Verify publish output
        shell: pwsh
        run: |
          if (!(Test-Path "publish/MarketProHunter/MarketProHunter.exe")) { throw "MarketProHunter.exe not found" }
          if (!(Test-Path "publish/MarketProHunter/config/vero-brands.txt")) { throw "config/vero-brands.txt not found in publish output" }
          if (!(Test-Path "publish/MarketProHunter/VERSION")) { throw "VERSION not found in publish output" }
          if (!(Test-Path "publish/MarketProHunter/QUICK_START.md")) { throw "QUICK_START.md not found in publish output" }
          if (!(Test-Path "publish/MarketProHunter/RELEASE_NOTES.md")) { throw "RELEASE_NOTES.md not found in publish output" }
          Get-ChildItem publish/MarketProHunter | Select-Object Name, Length

      - name: Upload EXE package
        uses: actions/upload-artifact@v4
        with:
          name: MarketProHunter-win-x64
          path: publish/MarketProHunter